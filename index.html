<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDWAVE</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
</head>
<body>

<div id="start-overlay">
  <div class="start-inner">
    <div class="s-wordmark">Handwave</div>
    <div class="s-h">
      손으로 연주하는<br><em>다이아토닉 악기</em>
    </div>
    <div class="s-desc">
      손가락 개수 → Ⅰ-Ⅶ 코드 선택<br>
      손의 거리 → 볼륨 제어<br>
      하단 건반 → 키 변경
    </div>
    <button class="s-go" id="start-btn">시작하기</button>
  </div>
</div>

<div id="main">
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="topbar">
    <div id="settings-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </div>
    <div id="app-name">Handwave</div>
    <div id="hud">
      <div class="hud-pill"><span class="hud-lbl">손가락</span><span class="hud-val" id="hud-fingers">—</span></div>
      <div class="hud-pill"><span class="hud-lbl">코드</span><span class="hud-val chord" id="hud-chord">—</span></div>
      <div class="hud-pill"><span class="hud-lbl">키</span><span class="hud-val" id="hud-key">C</span></div>
    </div>
  </div>

  <div id="settings-panel">
    <div class="s-head">설정</div>
    <div class="s-row">
      <div class="s-lbl">스케일</div>
      <select class="s-sel" id="scale-select">
        <option value="major">메이저 (이오니안)</option>
        <option value="dorian">도리안</option>
        <option value="phrygian">프리지안</option>
        <option value="lydian">리디안</option>
        <option value="mixolydian">믹소리디안</option>
        <option value="minor">내추럴 마이너</option>
        <option value="locrian">로크리안</option>
      </select>
    </div>
    <div class="s-row">
      <div class="s-lbl">코드 타입</div>
      <select class="s-sel" id="chord-type">
        <option value="triad">3화음</option>
        <option value="seventh">7화음</option>
        <option value="power">파워코드</option>
      </select>
    </div>
    <div class="s-row">
      <div class="s-lbl">음색</div>
      <select class="s-sel" id="synth-type">
        <option value="poly">폴리신스</option>
        <option value="fm">FM 신스</option>
        <option value="am">AM 신스</option>
      </select>
    </div>
    <div class="s-row">
      <div class="s-lbl">옥타브</div>
      <select class="s-sel" id="octave-select">
        <option value="2">2 — 낮음</option>
        <option value="3" selected>3 — 중간</option>
        <option value="4">4 — 높음</option>
      </select>
    </div>
    <div class="s-row">
      <div class="s-lbl">전환 딜레이</div>
      <div class="s-rrow">
        <input type="range" class="s-range" id="delay-range" min="0.1" max="1.0" step="0.05" value="0.4">
        <span class="s-rval" id="delay-val">0.4s</span>
      </div>
    </div>
  </div>

  <div id="vol-wrap">
    <div id="vol-lbl">vol</div>
    <div id="vol-track"><div id="vol-fill" style="height:50%"></div></div>
  </div>

  <div id="center-info">
    <div id="chord-roman">—</div>
    <div id="chord-main">—</div>
  </div>

  <div id="finger-wrap">
    <div id="finger-num">—</div>
    <div id="finger-lbl">fingers</div>
  </div>

  <div id="no-cam">웹캠을 찾을 수 없습니다<br>권한을 확인해 주세요</div>
  <div id="piano-bar"></div>
</div>

<script src="system.js"></script>
</body>
</html>
